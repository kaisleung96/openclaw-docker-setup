name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Check syntax
        run: |
          for script in src/*.sh; do
            bash -n "$script" || exit 1
          done
